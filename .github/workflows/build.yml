name: build

# Builds each custom Nerves system's artifact in CI and publishes it to this
# repo's GitHub Releases, so the consuming project (universal_proxy) downloads
# the prebuilt artifact and never needs a local buildroot toolchain.
#
#   - PRs / pushes: cheap checks only (fragment drift, deps resolve).
#   - Tag push `v*`: full buildroot build of every target, uploaded to the
#     Release for that tag. The system mix.exs `artifact_sites:
#     {:github_releases, "<org>/nerves_systems_universal_proxy"}` resolves
#     against exactly these assets (matched by app-name + checksum).
#
# This is a self-contained, per-subdir recipe — it suits the monorepo layout
# (matrix over target subdirs). The authoritative per-repo recipe,
# nerves-project/nerves_system_rpi3's .github/workflows/ci.yml, uses
# `gridpoint-com/actions-nerves-system@v1` + local composite actions that
# assume the system sits at the repo root; adapt from it if you prefer.
# VERIFY when the first build runs: the `mix nerves.artifact` invocation and
# the optional BlueZ buildroot sub-option names.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to upload Release assets

env:
  OTP_VERSION: "28.3"
  ELIXIR_VERSION: "1.19.5"

jobs:
  # Fast feedback: shared fragments are in sync and deps resolve. No buildroot.
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: make check

  build:
    # Full buildroot builds are slow/expensive — only on tags or manual run.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [rpi0, rpi0_2, rpi3, rpi4, rpi5]
    steps:
      # GitHub-hosted runners have only ~14 GB free, which a full Nerves
      # buildroot build can exhaust ("No space left on device" — seen on
      # rpi5/hailort). Reclaim ~25-30 GB of preinstalled tooling first.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/powershell \
            /usr/share/swift 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - uses: actions/checkout@v4

      # Buildroot host dependencies (Nerves "Installing on Linux" list).
      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential automake autoconf git squashfs-tools \
            ssh-askpass pkg-config curl libssl-dev libncurses-dev bc m4 unzip cmake \
            python3 cpio xz-utils

      - name: Install fwup
        run: |
          # fwup isn't in apt — grab the latest .deb from its GitHub release.
          url=$(curl -fsSL https://api.github.com/repos/fwup-home/fwup/releases/latest \
            | grep -oE '"browser_download_url": *"[^"]+_amd64\.deb"' | cut -d'"' -f4 | head -1)
          echo "Installing fwup from: $url"
          curl -fsSL -o /tmp/fwup.deb "$url"
          sudo dpkg -i /tmp/fwup.deb

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install Nerves bootstrap
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix archive.install hex nerves_bootstrap 1.15.0 --force

      # Optional but recommended: cache the buildroot download + ccache dirs to
      # turn ~30-90 min cold builds into minutes. (BR2_DL_DIR / ~/.nerves)
      - name: Cache Nerves/Buildroot
        uses: actions/cache@v4
        with:
          path: |
            ~/.nerves
            ~/.cache/nerves
          key: nerves-${{ matrix.target }}-${{ hashFiles(format('{0}/nerves_defconfig', matrix.target), format('{0}/linux-*.config', matrix.target)) }}
          restore-keys: nerves-${{ matrix.target }}-

      - name: Build the system artifact
        working-directory: ${{ matrix.target }}
        env:
          MIX_ENV: prod
        run: |
          mix deps.get
          # Compiling a :system package runs the buildroot build via
          # Nerves.System.BR, producing the artifact tarball.
          # VERIFY this invocation against the official nerves-systems CI:
          mix compile
          mix nerves.artifact

      - name: Upload artifact to the Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.target }}/*.tar.gz
          fail_on_unmatched_files: true
